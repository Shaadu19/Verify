<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exit Permit Verification</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        background: #f2f3f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 360px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        padding: 20px;
    }

    .title {
        text-align: center;
        color: #2f80ed;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 15px;
    }

    .status-box {
        background: #eef8ec;
        border: 2px solid #8fd18b;
        border-left: 6px solid #4caf50;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }

    .check-icon {
        width: 28px;
        height: 28px;
        background: #4caf50;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
    }

    .status-text {
        font-size: 15px;
    }

    .status-text strong {
        display: block;
        font-size: 16px;
        margin-bottom: 4px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 15px;
        overflow: hidden;
        border-radius: 10px;
    }

    td {
        padding: 12px;
        border: 1px solid #e0e0e0;
    }

    td:first-child {
        background: #fafafa;
        color: #555;
        width: 50%;
    }

    td:last-child {
        font-weight: 500;
        color: #222;
    }
</style>

</head>

<body>

<div class="card">
    <div class="title">EXIT PERMIT Verification</div>

    <div class="status-box">
        <div class="check-icon">✓</div>
        <div class="status-text">
            <strong>VALID EXIT PERMIT</strong>
            This exit permit is currently valid and active.
        </div>
    </div>

    <table>
        <tr>
            <td>Permit ID</td>
            <td>2633</td>
        </tr>
        <tr>
            <td>Vessel</td>
            <td>OCEAN PEARL</td>
        </tr>
        <tr>
            <td>IMO</td>
            <td>9642370</td>
        </tr>
        <tr>
            <td>Port</td>
            <td>Umm Qasr South Port</td>
        </tr>
        <tr>
            <td>Arrival Date</td>
            <td>25-Mar-2026</td>
        </tr>
        <tr>
            <td>Departure Date</td>
            <td>10-Apr-2026</td>
        </tr>
    </table>
</div>

</body>
</html>
